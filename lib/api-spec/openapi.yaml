openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Batra Butterfly Footwear Business OS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: retailers
    description: Retailer credit operations
  - name: analytics
    description: Analytics and reporting
  - name: staff
    description: Staff performance
  - name: stock
    description: Stock management
  - name: dashboard
    description: Dashboard summary
  - name: invoices
    description: Invoice management
  - name: suppliers
    description: Supplier management and bill scanning
  - name: payment
    description: Payment clearance operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /retailers:
    get:
      operationId: listRetailers
      tags: [retailers]
      summary: List all retailers
      responses:
        "200":
          description: List of retailers with credit summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RetailerSummary"
    post:
      operationId: createRetailer
      tags: [retailers]
      summary: Create a new retailer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRetailerBody"
      responses:
        "201":
          description: Created retailer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Retailer"

  /retailers/{id}:
    get:
      operationId: getRetailer
      tags: [retailers]
      summary: Get retailer detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Retailer detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetailerSummary"
        "404":
          description: Not found
    patch:
      operationId: updateRetailer
      tags: [retailers]
      summary: Update a retailer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRetailerBody"
      responses:
        "200":
          description: Updated retailer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Retailer"
        "404":
          description: Not found
    delete:
      operationId: deleteRetailer
      tags: [retailers]
      summary: Delete a retailer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /retailers/{id}/ledger:
    get:
      operationId: getRetailerLedger
      tags: [retailers]
      summary: Get retailer ledger entries
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ledger entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LedgerEntry"

  /retailers/{id}/ledger/entry:
    post:
      operationId: addLedgerEntry
      tags: [retailers]
      summary: Add a ledger entry (sale or payment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLedgerEntryBody"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerEntry"

  /analytics/top-retailers:
    get:
      operationId: getTopRetailers
      tags: [analytics]
      summary: Get top retailers by purchase
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Top retailers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RetailerAnalytics"

  /analytics/under-buying:
    get:
      operationId: getUnderBuyingRetailers
      tags: [analytics]
      summary: Get under-performing retailers
      responses:
        "200":
          description: Under-buying retailers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RetailerAnalytics"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff
      responses:
        "200":
          description: Staff list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffBody"
      responses:
        "201":
          description: Created staff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/performance:
    get:
      operationId: getStaffPerformance
      tags: [staff]
      summary: Get staff performance metrics
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Staff performance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffPerformance"

  /staff/{id}:
    get:
      operationId: getStaffDetail
      tags: [staff]
      summary: Get staff member details and performance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffPerformance"
        "404":
          description: Not found

  /sales:
    post:
      operationId: createSale
      tags: [staff]
      summary: Record a sale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /staff/attendance:
    get:
      operationId: getAttendance
      tags: [staff]
      summary: Get attendance for all staff on a date
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Attendance status per staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceStatusEntry"

  /staff/attendance/face-scan:
    post:
      operationId: faceScanAttendance
      tags: [staff]
      summary: Mark attendance by matching a scanned face descriptor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaceScanBody"
      responses:
        "200":
          description: Face scan result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaceScanResult"

  /staff/attendance/mark:
    post:
      operationId: markAttendance
      tags: [staff]
      summary: Manually mark attendance for a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarkAttendanceBody"
      responses:
        "200":
          description: Attendance record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffAttendanceRecord"

  /staff/loans:
    post:
      operationId: createStaffLoan
      tags: [staff]
      summary: Record a loan/advance for a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffLoanBody"
      responses:
        "201":
          description: Created loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffLoan"

  /staff/loans/{id}/clear:
    post:
      operationId: clearStaffLoan
      tags: [staff]
      summary: Mark a staff loan as cleared
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated loan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffLoan"

  /staff/payments:
    get:
      operationId: listStaffPayments
      tags: [staff]
      summary: List staff payment clearance requests
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Staff payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffPayment"
    post:
      operationId: createStaffPayment
      tags: [staff]
      summary: Request a staff payment clearance (pending master approval)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStaffPaymentBody"
      responses:
        "201":
          description: Created payment request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffPayment"

  /staff/payments/{id}/approve:
    post:
      operationId: approveStaffPayment
      tags: [staff]
      summary: Approve a staff payment (master only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffPayment"

  /staff/payments/{id}/reject:
    post:
      operationId: rejectStaffPayment
      tags: [staff]
      summary: Reject a staff payment (master only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffPayment"

  /staff/{id}/face-enroll:
    post:
      operationId: enrollStaffFace
      tags: [staff]
      summary: Enroll or update a staff member's face descriptor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaceEnrollBody"
      responses:
        "200":
          description: Updated staff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/{id}/attendance-summary:
    get:
      operationId: getStaffAttendanceSummary
      tags: [staff]
      summary: Monthly attendance summary for a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSummary"

  /staff/{id}/loans:
    get:
      operationId: listStaffLoans
      tags: [staff]
      summary: List loans for a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffLoan"

  /staff/{id}/salary:
    get:
      operationId: getStaffSalary
      tags: [staff]
      summary: Salary overview for a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
        - name: year
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Salary overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalaryOverview"

  /stock:
    get:
      operationId: listStock
      tags: [stock]
      summary: List stock items
      responses:
        "200":
          description: Stock list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockItem"
    post:
      operationId: createStockItem
      tags: [stock]
      summary: Create a stock product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStockItemBody"
      responses:
        "201":
          description: Created stock item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockItem"

  /stock/analyze:
    post:
      operationId: analyzeStockImage
      tags: [stock]
      summary: Analyze uploaded image for article code suggestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeImageBody"
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageAnalysisResult"

  /stock/confirm:
    post:
      operationId: confirmStockMovement
      tags: [stock]
      summary: Confirm stock movement after image analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmStockBody"
      responses:
        "201":
          description: Stock movement confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockMovement"

  /stock/analyze-sale:
    post:
      operationId: analyzeSaleImage
      tags: [stock]
      summary: Analyze a sale image to detect multiple sold items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSaleImageBody"
      responses:
        "200":
          description: AI sale analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleAnalysisResult"

  /stock/confirm-sale:
    post:
      operationId: confirmSale
      tags: [stock]
      summary: Confirm a sale, deducting all detected items from stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmSaleBody"
      responses:
        "201":
          description: Sale confirmed with stock deductions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmSaleResult"

  /stock/import-airtable:
    post:
      operationId: importAirtable
      tags: [stock]
      summary: Import one page of products from Airtable into the account inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportAirtableBody"
      responses:
        "200":
          description: Page import result with cursor for the next page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAirtableResult"

  /stock/tag-prices:
    post:
      operationId: tagPrices
      tags: [stock]
      summary: Detect each footwear pair in a photo and return price-tag anchor points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagPricesBody"
      responses:
        "200":
          description: Price-tag anchor points for the photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagPricesResult"

  /stock/movements:
    get:
      operationId: listStockMovements
      tags: [stock]
      summary: List stock movements
      responses:
        "200":
          description: Stock movements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockMovement"

  /stock/products/{id}:
    delete:
      operationId: deleteStockItem
      tags: [stock]
      summary: Delete a product and its associated stock data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /stock/products/{id}/images:
    get:
      operationId: listProductImages
      tags: [stock]
      summary: List all images for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductImage"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary KPIs
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: retailerId
          in: query
          required: false
          schema:
            type: integer
        - name: staffId
          in: query
          required: false
          schema:
            type: integer
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Invoice list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceWithItems"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create a new invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"

  /invoices/daily-summary:
    get:
      operationId: getDailySalesSummary
      tags: [invoices]
      summary: Get daily sales summary
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Daily sales grouped by date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailySalesEntry"

  /invoices/analyze-image:
    post:
      operationId: analyzeInvoiceImage
      tags: [invoices]
      summary: Analyze invoice photo with Claude AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInvoiceImageBody"
      responses:
        "200":
          description: Extracted invoice data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceAnalysisResult"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Not found
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete a draft invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/confirm:
    post:
      operationId: confirmInvoice
      tags: [invoices]
      summary: Confirm invoice and cascade updates to stock, ledger, and commissions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed invoice with cascade results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceConfirmResult"
        "404":
          description: Not found

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierSummary"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get supplier detail with bills
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier with bill history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierWithBills"
        "404":
          description: Not found

  /suppliers/{id}/bills:
    get:
      operationId: listSupplierBills
      tags: [suppliers]
      summary: List bills for a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of supplier bills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierBillWithItems"
    post:
      operationId: createSupplierBill
      tags: [suppliers]
      summary: Create a supplier bill (draft)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBillBody"
      responses:
        "201":
          description: Created bill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierBillWithItems"

  /suppliers/{id}/bills/scan:
    post:
      operationId: analyzeSupplierBill
      tags: [suppliers]
      summary: Analyze supplier bill image with AI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeSupplierBillBody"
      responses:
        "200":
          description: Extracted bill data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierBillAnalysisResult"

  /suppliers/bills/{id}:
    get:
      operationId: getSupplierBill
      tags: [suppliers]
      summary: Get supplier bill detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bill with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierBillWithItems"
        "404":
          description: Not found

  /suppliers/bills/{id}/confirm:
    post:
      operationId: confirmSupplierBill
      tags: [suppliers]
      summary: Confirm supplier bill and add stock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Confirmed bill with stock updates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierBillConfirmResult"
        "404":
          description: Not found

  /payment-clearance:
    get:
      operationId: listPaymentClearances
      tags: [payment]
      summary: List all payment clearances
      responses:
        "200":
          description: List of payment clearances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentClearanceRecord"
    post:
      operationId: createPaymentClearance
      tags: [payment]
      summary: Request a payment clearance - queued for master approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentClearanceBody"
      responses:
        "201":
          description: Payment clearance request created (status pending)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentClearanceResult"
        "404":
          description: Retailer or vendor not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required: [error]

  /payment-clearance/{id}/approve:
    post:
      operationId: approvePaymentClearance
      tags: [payment]
      summary: Master approves a pending payment clearance - deducts from retailer ledger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentClearanceRecord"
        "403":
          description: Not master
        "404":
          description: Not found

  /payment-clearance/{id}/reject:
    post:
      operationId: rejectPaymentClearance
      tags: [payment]
      summary: Master rejects a pending payment clearance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentClearanceRecord"
        "403":
          description: Not master
        "404":
          description: Not found

