kind = "web"
previewPath = "/"
title = "Batra Butterfly"
version = "1.0.0"
id = "artifacts/batra-butterfly"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19784

[services.development]
run = "pnpm --filter @workspace/batra-butterfly run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/batra-butterfly", "run", "build" ]
publicDir = "artifacts/batra-butterfly/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19784"
BASE_PATH = "/"
